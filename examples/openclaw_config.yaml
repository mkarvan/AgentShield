# Example OpenClaw configuration with AgentShield skill enabled

agent:
  name: my-openclaw-agent

skills:
  - module: agentshield.integrations.openclaw
    class: AgentShieldSkill
    # AgentShieldSkill is registered as a pre-condition for install-type actions
    triggers:
      - action_type: pip_install
      - action_type: npm_install
      - action_type: cargo_add
