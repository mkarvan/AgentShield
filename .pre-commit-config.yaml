repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the ruff version in pyproject.toml [dev] / CI. Keep these
    # in sync: an older ruff here (e.g. v0.4.10) lints/formats differently and
    # fights CI (e.g. UP038, f-string formatting).
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
