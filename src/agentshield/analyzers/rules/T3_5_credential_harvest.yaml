rules:
  - id: agentshield-T3.5-environ-get-token
    patterns:
      - pattern: os.environ.get($KEY)
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i).*(TOKEN|KEY|SECRET|PASSWORD|PASS|CREDENTIAL|CRED|API_KEY|AUTH).*'
    message: "T3.5: Credential harvesting — reading sensitive environment variable at install time"
    languages: [python]
    severity: ERROR
    metadata:
      agentshield_rule: T3.5
      agentshield_severity: CRITICAL
      category: credential-harvesting

  - id: agentshield-T3.5-environ-index-token
    patterns:
      - pattern: os.environ[$KEY]
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i).*(TOKEN|KEY|SECRET|PASSWORD|PASS|CREDENTIAL|CRED|API_KEY|AUTH).*'
    message: "T3.5: Credential harvesting — reading sensitive environment variable at install time"
    languages: [python]
    severity: ERROR
    metadata:
      agentshield_rule: T3.5
      agentshield_severity: CRITICAL
      category: credential-harvesting

  - id: agentshield-T3.5-getenv-token
    patterns:
      - pattern: os.getenv($KEY)
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i).*(TOKEN|KEY|SECRET|PASSWORD|PASS|CREDENTIAL|CRED|API_KEY|AUTH).*'
    message: "T3.5: Credential harvesting — reading sensitive environment variable at install time"
    languages: [python]
    severity: ERROR
    metadata:
      agentshield_rule: T3.5
      agentshield_severity: CRITICAL
      category: credential-harvesting

  - id: agentshield-T3.5-environ-items
    patterns:
      - pattern: os.environ.items()
    message: "T3.5: Credential harvesting — iterating all environment variables at install time"
    languages: [python]
    severity: WARNING
    metadata:
      agentshield_rule: T3.5
      agentshield_severity: HIGH
      category: credential-harvesting

  - id: agentshield-T3.5-environ-copy
    patterns:
      - pattern: dict(os.environ)
    message: "T3.5: Credential harvesting — copying entire environment dict at install time"
    languages: [python]
    severity: WARNING
    metadata:
      agentshield_rule: T3.5
      agentshield_severity: HIGH
      category: credential-harvesting
