rules:
  - id: agentshield-T3.1-subprocess-call
    patterns:
      - pattern: subprocess.call(...)
    message: "T3.1: Shell execution via subprocess.call() detected at install time"
    languages: [python]
    severity: WARNING
    metadata:
      agentshield_rule: T3.1
      agentshield_severity: HIGH
      category: install-time-shell

  - id: agentshield-T3.1-subprocess-run
