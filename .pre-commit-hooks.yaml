- id: agentshield-scan
  name: AgentShield Security Scan
  description: Scan manifest files for vulnerable or malicious packages before committing.
  entry: agentshield scan-file
  language: python
  types: [file]
  files: '(requirements.*\.txt|Pipfile\.lock|package-lock\.json|package\.json|Cargo\.lock|Cargo\.toml|pyproject\.toml)$'
  # AgentShield is not published on PyPI, so a bare ['agentshield'] dependency
  # is unresolvable. Install from the Git repository instead. (Switch this to a
  # plain version spec, e.g. ['agentshield>=0.9'], once it is released to PyPI.)
  additional_dependencies: ['agentshield @ git+https://github.com/mkarvan/AgentShield.git']
