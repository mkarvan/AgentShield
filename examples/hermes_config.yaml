# Example Hermes Agent configuration with AgentShield enabled.
#
# AgentShield is a real Hermes plugin: installing `agentshield[hermes]` exposes a
# `hermes_agent.plugins` entry-point named `agentshield`, which wires a
# `pre_tool_call` hook. Enable it via `plugins.enabled` below. (There is no
# `module:`/`class:` plugin form in Hermes — that never fired.)

agent:
  name: my-agent
  model: claude-sonnet-4-6

plugins:
  enabled:
    - agentshield
  # Optional: point the guard at a specific AgentShield config.
  config:
    agentshield:
      config_path: ~/.config/agentshield/config.toml

# The guard scans installs that run through the `terminal` tool (and
# `execute_code`). No special tool list is required for interception, but these
# are the tools a typical agent has enabled:
tools:
  - terminal
  - execute_code
  - read_file
  - write_file
